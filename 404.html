<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tibo TESSIER | 404 - Page introuvable</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root {
      --ff: 'DM Sans', sans-serif;
      --ffd: 'Syne', sans-serif;

      --bg0: #07070d;

      --t1: #ededf4;
      --t2: #8080a0;

      --acc: #6b8cff;

      --r: 11px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--ff);
      background: var(--bg0);
      color: var(--t1);
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      position: relative;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    .bg-blobs {
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      background:
        radial-gradient(circle at 20% 18%, rgba(107,140,255,.12), transparent 32%),
        radial-gradient(circle at 80% 28%, rgba(34,211,238,.08), transparent 24%),
        radial-gradient(circle at 50% 82%, rgba(244,63,94,.06), transparent 28%),
        var(--bg0);
    }

    .error-container {
      text-align: center;
      z-index: 1;
      max-width: 500px;
      animation: fadeInUp 0.5s ease-out forwards;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .error-code {
      font-family: var(--ffd);
      font-size: clamp(80px, 15vw, 140px);
      font-weight: 800;
      line-height: 1;
      margin-bottom: 10px;
      letter-spacing: -4px;
      background: linear-gradient(135deg, var(--t1), var(--acc));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .error-title {
      font-family: var(--ffd);
      font-size: clamp(24px, 4vw, 32px);
      font-weight: 700;
      color: var(--t1);
      margin-bottom: 16px;
      letter-spacing: -0.5px;
    }

    .error-desc {
      font-size: 16px;
      color: var(--t2);
      margin-bottom: 36px;
    }

    .btn-home {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 14px 28px;
      border-radius: var(--r);
      background: var(--acc);
      color: white;
      text-decoration: none;
      font-weight: 700;
      font-size: 15px;
      transition: opacity 0.15s ease, transform 0.15s ease;
    }

    .btn-home:hover {
      opacity: 0.87;
      transform: translateY(-2px);
    }

    .btn-home i {
      font-size: 14px;
    }

  </style>
</head>
<body>

  <div class="bg-blobs"></div>

  <div class="error-container">
    <div class="error-code">404</div>
    <h1 class="error-title">Page introuvable</h1>
    <p class="error-desc">Oups ! La page que vous recherchez semble s'être perdue dans le cyberespace ou n'existe plus.</p>
    
    <a href="index.html" class="btn-home">
      <i class="fas fa-arrow-left"></i>
      Retour à l'accueil
    </a>
  </div>

</body>
</html>
